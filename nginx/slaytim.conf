# ─────────────────────────────────────────────────────────────────────────────
# Slaytim — Nginx configuration
# Canonical domain: https://slaytim.com  (no www)
#
# Deploy:
#   cp nginx/slaytim.conf /etc/nginx/sites-available/slaytim
#   ln -sf /etc/nginx/sites-available/slaytim /etc/nginx/sites-enabled/slaytim
#   nginx -t && systemctl reload nginx
#
# SSL cert (covers both apex and www):
#   certbot certonly --nginx -d slaytim.com -d www.slaytim.com
# ─────────────────────────────────────────────────────────────────────────────


# ── 1. HTTP → HTTPS redirect (apex + www) ────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name slaytim.com www.slaytim.com;

    # Let's Encrypt ACME challenge must pass through (needed for cert renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://slaytim.com$request_uri;
    }
}


# ── 2. HTTPS www → apex 308 permanent redirect ───────────────────────────────
#
# 308 (not 301) preserves the HTTP method — a POST to www stays a POST after
# redirect. This matters for form submissions or API clients that might land on
# the www subdomain.
#
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.slaytim.com;

    ssl_certificate     /etc/letsencrypt/live/slaytim.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/slaytim.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers even on the redirect server (browsers may render briefly)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    return 308 https://slaytim.com$request_uri;
}


# ── 3. Canonical apex domain → Next.js ───────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name slaytim.com;

    ssl_certificate     /etc/letsencrypt/live/slaytim.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/slaytim.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"                        always;
    add_header X-Frame-Options         "DENY"                           always;
    add_header X-XSS-Protection        "1; mode=block"                  always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Static assets — long cache, served directly ───────────────────────────
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Next.js public/ folder ────────────────────────────────────────────────
    location /public/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    # ── Main Next.js app ──────────────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Required for WebSocket support (Next.js HMR & SSE)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Pass real client info to Next.js
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;

        # Buffer settings for large SSR pages
        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      8 16k;
    }
}


# ── 4. api.slaytim.com — untouched ───────────────────────────────────────────
# Keep your existing api.slaytim.com server block here or in a separate file.
# This config does NOT touch api.slaytim.com.
