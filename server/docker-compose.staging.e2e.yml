services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: slaytim_staging
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d slaytim_staging"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - pg-staging-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - redis-staging-data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - minio-staging-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/slaytim-stage || true &&
      mc anonymous set download local/slaytim-stage || true
      "

  migrate:
    build:
      context: .
      target: production
    env_file:
      - .env.staging.e2e
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command: sh -lc "npx prisma migrate deploy && node scripts/seed-categories.js"

  api:
    build:
      context: .
      target: production
    command: npm run start
    env_file:
      - .env.staging.e2e
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    volumes:
      - uploads-data:/app/uploads
    restart: unless-stopped

  worker:
    build:
      context: .
      target: production
    command: npm run worker:conversion:redis
    env_file:
      - .env.staging.e2e
    environment:
      REDIS_URL: ""
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - uploads-data:/app/uploads
    restart: unless-stopped

volumes:
  pg-staging-data:
  redis-staging-data:
  minio-staging-data:
  uploads-data:
