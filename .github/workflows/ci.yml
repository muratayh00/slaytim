name: CI

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging]

jobs:
  build-lint:
    name: Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5001/api
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

  smoke-tests:
    name: Playwright Smoke Tests
    runs-on: ubuntu-latest
    needs: build-lint
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: slaytim_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d slaytim_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Install Playwright browsers
        working-directory: client
        run: npx playwright install chromium --with-deps

      - name: Setup database
        working-directory: server
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres123@localhost:5432/slaytim_ci?schema=public
          DIRECT_URL: postgresql://postgres:postgres123@localhost:5432/slaytim_ci?schema=public

      - name: Seed database
        working-directory: server
        run: node prisma/seed.js || true
        env:
          DATABASE_URL: postgresql://postgres:postgres123@localhost:5432/slaytim_ci?schema=public
          DIRECT_URL: postgresql://postgres:postgres123@localhost:5432/slaytim_ci?schema=public
        continue-on-error: true

      - name: Start backend
        working-directory: server
        run: |
          node src/index.js &
          echo "Backend started"
        env:
          PORT: 5001
          DATABASE_URL: postgresql://postgres:postgres123@localhost:5432/slaytim_ci?schema=public
          DIRECT_URL: postgresql://postgres:postgres123@localhost:5432/slaytim_ci?schema=public
          JWT_SECRET: ci-test-secret-at-least-32-chars-long
          CLIENT_URL: http://localhost:3000
          NODE_ENV: test
          REDIS_ENABLED: false
          REDIS_URL: redis://localhost:6379
        timeout-minutes: 2

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:5001/api/health > /dev/null 2>&1; then
              echo "Backend is ready"
              break
            fi
            echo "Waiting for backend... ($i)"
            sleep 2
          done

      - name: Build & start frontend
        working-directory: client
        run: |
          npm run build
          npm run start &
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5001/api
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          PORT: 3000
        timeout-minutes: 5

      - name: Wait for frontend
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend is ready"
              break
            fi
            echo "Waiting for frontend... ($i)"
            sleep 3
          done

      - name: Run Playwright smoke tests
        working-directory: client
        run: npx playwright test tests/e2e/navigation.spec.ts tests/e2e/api-health.spec.ts tests/e2e/protected-routes.spec.ts tests/e2e/engagement.spec.ts
        env:
          CI: true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: client/test-results/
          retention-days: 7
